<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | 双碳平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{primary:'#24936E',secondary:'#1E7A5C'}}}}
  </script>
</head>
<body class="bg-gradient-to-br from-green-50 to-white min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-10">
    <a href="index.html" class="flex items-center gap-3 mb-4">
      <img src="https://free.boltp.com/2026/05/01/69f4520b4985f.webp" alt="校徽" class="w-10 h-10 rounded-full">
      <span class="text-primary text-xl font-bold">双碳平台</span>
    </a>
    <h2 class="text-2xl font-bold mt-6 text-gray-800">账号登录</h2>
    <p class="text-gray-500 mt-2">登录你的碳积分个人账户</p>

    <div class="mt-8">
      <div class="mb-5">
        <label class="block text-gray-700 mb-2">用户名</label>
        <input id="username" type="text" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary focus:outline-none" placeholder="请输入用户名">
      </div>
      <div class="mb-5">
        <label class="block text-gray-700 mb-2">密码</label>
        <input id="pwd" type="password" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary focus:outline-none" placeholder="请输入密码">
      </div>
      <button onclick="login()" class="w-full py-3 bg-primary text-white rounded-lg hover:bg-secondary transition">立即登录</button>
      <p class="text-center mt-5 text-gray-600">还没有账号？<a href="register.html" class="text-primary">立即注册</a></p>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB9c5XgO7XZ7xQkF9d8c5xQZ7xQkF9d8c5x",
      authDomain: "carbon-platform-2026.firebaseapp.com",
      databaseURL: "https://carbon-platform-2026-default-rtdb.firebaseio.com",
      projectId: "carbon-platform-2026",
      storageBucket: "carbon-platform-2026.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abc123def456"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login(){
      let user = document.getElementById('username').value.trim();
      let pwd = document.getElementById('pwd').value.trim();
      if(!user||!pwd){
        alert('请输入用户名和密码');
        return;
      }
      db.ref("users").once("value",snap=>{
        let data = snap.val();
        let ok = false;
        for(let key in data){
          if(data[key].username===user && data[key].pwd===pwd){
            localStorage.setItem('nowUser',JSON.stringify(data[key]));
            ok=true;
            location.href="profile.html";
            break;
          }
        }
        if(!ok) alert('用户名或密码错误');
      });
    }
  </script>
</body>
</html>
