<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高级碳足迹计算器 | 校园双碳平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{primary:'#24936E',secondary:'#1E7A5C'}}}}
  </script>
</head>
<body class="bg-gradient-to-br from-green-50 to-white min-h-screen">
  <!-- 智能导航 -->
  <nav class="fixed top-0 w-full bg-white shadow px-6 py-4 flex justify-between items-center z-50">
    <a href="index.html" class="flex items-center gap-3">
      <img src="https://free.boltp.com/2026/05/01/69f4520b4985f.webp" alt="校徽" class="w-10 h-10 rounded-full object-cover">
      <span class="text-2xl font-bold text-primary">校园双碳平台</span>
    </a>
    <div class="hidden md:flex space-x-6 font-medium">
      <a href="index.html" class="text-gray-700 hover:text-primary transition">首页</a>
      <a href="carbon.html" class="text-primary border-b-2 border-primary">碳足迹计算器</a>
      <a href="sink.html" class="text-gray-700 hover:text-primary transition">校园碳汇</a>
      <a href="market.html" class="text-gray-700 hover:text-primary transition">低碳集市</a>
      <a href="intro.html" class="text-gray-700 hover:text-primary transition">双碳科普</a>
    </div>
    <div id="navBtn"></div>
  </nav>

  <div class="container mx-auto max-w-4xl bg-white rounded-2xl shadow-xl p-8 mt-28 mb-10">
    <h2 class="text-2xl font-bold text-gray-800 text-center">个人精细化碳足迹计算器</h2>
    <p class="text-gray-500 text-center mt-2">多维度选项 + 手动数值输入，精确核算CO₂排放量</p>

    <div class="w-full h-52 rounded-xl overflow-hidden mt-6">
      <img src="https://img0.baidu.com/it/u=2675658413,3875921239&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=400" class="w-full h-full object-cover">
    </div>

    <div class="grid md:grid-cols-2 gap-6 mt-8">
      <div>
        <label class="block text-gray-700 font-medium mb-2">通勤方式</label>
        <select id="traffic" class="w-full border rounded-lg px-4 py-2 focus:border-primary focus:outline-none">
          <option value="0">步行/骑行（0kg/周）</option>
          <option value="12">公交/地铁</option>
          <option value="45">私家车接送</option>
        </select>
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-2">每周通勤天数</label>
        <input id="trafficDay" type="number" value="5" class="w-full border rounded-lg px-4 py-2">
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-2">每周外卖次数</label>
        <input id="takeaway" type="number" value="0" class="w-full border rounded-lg px-4 py-2">
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-2">每日空调使用小时</label>
        <input id="air" type="number" value="2" class="w-full border rounded-lg px-4 py-2">
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-2">每周一次性餐具使用</label>
        <input id="oneOff" type="number" value="0" class="w-full border rounded-lg px-4 py-2">
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-2">每周消耗纸张(张)</label>
        <input id="paper" type="number" value="20" class="w-full border rounded-lg px-4 py-2">
      </div>
    </div>

    <button onclick="calcCarbon()" class="w-full py-3 bg-primary text-white rounded-lg mt-8 text-lg">
      开始精确计算碳足迹
    </button>

    <div id="resBox" class="mt-8 hidden">
      <div class="p-6 bg-green-50 rounded-xl">
        <h4 class="font-bold text-lg text-gray-800">测算结果</h4>
        <p id="resText" class="mt-3 text-gray-700"></p>
      </div>
      <div id="chart" class="w-full h-64 mt-6"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB9c5XgO7XZ7xQkF9d8c5xQZ7xQkF9d8c5x",
      authDomain: "carbon-platform-2026.firebaseapp.com",
      databaseURL: "https://carbon-platform-2026-default-rtdb.firebaseio.com",
      projectId: "carbon-platform-2026",
      storageBucket: "carbon-platform-2026.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abc123def456"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <script>
    let myChart;
    function calcCarbon(){
      let traffic = parseFloat(document.getElementById('traffic').value);
      let trafficDay = parseFloat(document.getElementById('trafficDay').value);
      let takeaway = parseFloat(document.getElementById('takeaway').value);
      let air = parseFloat(document.getElementById('air').value);
      let oneOff = parseFloat(document.getElementById('oneOff').value);
      let paper = parseFloat(document.getElementById('paper').value);

      let t1 = traffic * trafficDay /5;
      let t2 = takeaway * 2.5;
      let t3 = air * 1.2;
      let t4 = oneOff * 0.8;
      let t5 = paper * 0.05;
      let total = t1+t2+t3+t4+t5;

      let level,advice;
      if(total<15){level='低碳优秀';advice='继续保持绿色出行、减少外卖和一次性用品';}
      else if(total<40){level='中等排放';advice='建议多步行骑行、减少空调时长和外卖频次';}
      else{level='碳排放偏高';advice='优先绿色通勤、拒绝一次性用品、节约用电用纸';}

      document.getElementById('resBox').classList.remove('hidden');
      document.getElementById('resText').innerHTML = `
        本周总碳排放量：<span class="text-primary font-bold text-xl">${total.toFixed(2)} kg CO₂</span><br>
        排放等级：${level}<br>
        优化建议：${advice}<br>
        测算完成自动发放：<span class="text-primary">+10 碳积分</span>
      `;

      if(!myChart) myChart = echarts.init(document.getElementById('chart'));
      myChart.setOption({
        xAxis:{type:'category',data:['通勤','外卖','空调','一次性用品','纸张']},
        yAxis:{type:'value',name:'kg CO₂'},
        series:[{type:'bar',data:[t1.toFixed(2),t2.toFixed(2),t3.toFixed(2),t4.toFixed(2),t5.toFixed(2)],itemStyle:{color:'#24936E'}}]
      });

      let nowUser = JSON.parse(localStorage.getItem('nowUser')||'null');
      if(nowUser && window.addScoreAndCarbon){
        window.addScoreAndCarbon(10,total.toFixed(2));
      }
    }
  </script>

  <script>
    function logout(){
      localStorage.removeItem('nowUser');
      location.href='index.html';
    }
    (function(){
      let nowUser = JSON.parse(localStorage.getItem('nowUser')||'null');
      let navBtn = document.getElementById('navBtn');
      if(nowUser){
        navBtn.innerHTML = `
          <a href="profile.html" class="px-4 py-2 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition">个人中心</a>
          <a href="javascript:logout()" class="px-4 py-2 rounded-full bg-gray-500 text-white hover:bg-gray-600 transition ml-2">退出</a>
        `;
      }else{
        navBtn.innerHTML = `
          <a href="login.html" class="px-4 py-2 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition">登录</a>
          <a href="register.html" class="px-4 py-2 rounded-full bg-primary text-white hover:bg-secondary transition ml-2">注册</a>
        `;
      }
    })();
  </script>
</body>
</html>
