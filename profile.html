<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 | 碳积分账户</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{primary:'#24936E',secondary:'#1E7A5C'}}}}
  </script>
</head>
<body class="bg-gradient-to-br from-green-50 to-white min-h-screen">
  <nav class="fixed top-0 w-full bg-white shadow px-6 py-4 flex justify-between items-center z-50">
    <a href="index.html" class="flex items-center gap-3">
      <img src="https://free.boltp.com/2026/05/01/69f4520b4985f.webp" alt="校徽" class="w-10 h-10 rounded-full object-cover">
      <span class="text-2xl font-bold text-primary">校园双碳平台</span>
    </a>
    <div class="hidden md:flex space-x-6 font-medium">
      <a href="index.html" class="text-gray-700 hover:text-primary transition">首页</a>
      <a href="carbon.html" class="text-gray-700 hover:text-primary transition">碳足迹计算器</a>
      <a href="sink.html" class="text-gray-700 hover:text-primary transition">校园碳汇</a>
      <a href="market.html" class="text-gray-700 hover:text-primary transition">低碳集市</a>
      <a href="intro.html" class="text-gray-700 hover:text-primary transition">双碳科普</a>
    </div>
    <div id="navBtn"></div>
  </nav>

  <div class="container mx-auto max-w-2xl bg-white rounded-2xl shadow-xl p-10 mt-28 mb-10">
    <div class="text-center">
      <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center text-primary text-3xl mx-auto">
        <i class="fa fa-user"></i>
      </div>
      <h3 id="nick" class="text-xl font-bold mt-4 text-gray-800"></h3>
      <p class="text-gray-500">个人碳积分 & 碳排放档案</p>
    </div>

    <div class="grid grid-cols-2 gap-6 mt-8">
      <div class="bg-green-50 p-6 rounded-xl text-center">
        <p class="text-gray-600">当前碳积分</p>
        <p id="score" class="text-3xl font-bold text-primary mt-2">0</p>
      </div>
      <div class="bg-green-50 p-6 rounded-xl text-center">
        <p class="text-gray-600">累计碳排放(kg)</p>
        <p id="carbonTotal" class="text-3xl font-bold text-gray-800 mt-2">0</p>
      </div>
    </div>

    <div class="mt-8">
      <h4 class="font-bold text-gray-800 text-lg">碳积分规则</h4>
      <ul class="mt-3 text-gray-600 space-y-2">
        <li><i class="fa fa-check text-primary mr-2"></i>完成一次碳足迹测算 +10积分</li>
        <li><i class="fa fa-check text-primary mr-2"></i>发布闲置物品 +15积分</li>
      </ul>
    </div>

    <a href="carbon.html" class="block text-center mt-8 py-3 bg-primary text-white rounded-lg">
      去测算碳足迹，领取积分
    </a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB9c5XgO7XZ7xQkF9d8c5xQZ7xQkF9d8c5x",
      authDomain: "carbon-platform-2026.firebaseapp.com",
      databaseURL: "https://carbon-platform-2026-default-rtdb.firebaseio.com",
      projectId: "carbon-platform-2026",
      storageBucket: "carbon-platform-2026.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abc123def456"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let nowUser = JSON.parse(localStorage.getItem('nowUser')||'null');
    if(!nowUser){
      location.href='login.html';
    }else{
      document.getElementById('nick').innerText = nowUser.username;
      document.getElementById('score').innerText = nowUser.score||0;
      document.getElementById('carbonTotal').innerText = nowUser.carbonTotal||0;
    }

    function logout(){
      localStorage.removeItem('nowUser');
      location.href='index.html';
    }

    window.addScoreAndCarbon = function(score,carbon){
      let u = JSON.parse(localStorage.getItem('nowUser'));
      if(!u) return;
      db.ref("users").once("value",snap=>{
        let d = snap.val();
        for(let k in d){
          if(d[k].username === u.username){
            d[k].score = (d[k].score||0)+score;
            d[k].carbonTotal = (parseFloat(d[k].carbonTotal||0)+parseFloat(carbon)).toFixed(2);
            db.ref("users/"+k).update(d[k]);
            localStorage.setItem('nowUser',JSON.stringify(d[k]));
            alert('已获得积分，数据已同步云端！');
            location.reload();
          }
        }
      });
    }
  </script>

  <script>
    (function(){
      let nowUser = JSON.parse(localStorage.getItem('nowUser')||'null');
      let navBtn = document.getElementById('navBtn');
      if(nowUser){
        navBtn.innerHTML = `
          <a href="profile.html" class="px-4 py-2 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition">个人中心</a>
          <a href="javascript:logout()" class="px-4 py-2 rounded-full bg-gray-500 text-white hover:bg-gray-600 transition ml-2">退出</a>
        `;
      }else{
        navBtn.innerHTML = `
          <a href="login.html" class="px-4 py-2 rounded-full border border-primary text-primary hover:bg-primary hover:text-white transition">登录</a>
          <a href="register.html" class="px-4 py-2 rounded-full bg-primary text-white hover:bg-secondary transition ml-2">注册</a>
        `;
      }
    })();
  </script>
</body>
</html>
